<section class="quote-section" id="quote" aria-labelledby="quote-title">
  <div class="quote-panel">
    <div class="quote-copy">
      <p class="section-kicker">{{ 'quote.kicker' | transloco }}</p>
      <h2 id="quote-title">{{ 'quote.title' | transloco }}</h2>
      <p>
        {{ 'quote.copy' | transloco }}
      </p>
    </div>

    <form class="quote-form" [formGroup]="quoteForm" (ngSubmit)="submitEnquiry()" novalidate>
      <label [class.has-error]="showError('name')">
        {{ 'quote.fields.name' | transloco }}
        <input
          type="text"
          autocomplete="name"
          formControlName="name"
        >
        @if (errorMessage('name'); as error) {
          <span class="field-error">{{ error.key | transloco: error.params }}</span>
        }
      </label>
      <label [class.has-error]="showError('email')">
        {{ 'quote.fields.email' | transloco }}
        <input
          type="email"
          autocomplete="email"
          formControlName="email"
        >
        @if (errorMessage('email'); as error) {
          <span class="field-error">{{ error.key | transloco: error.params }}</span>
        }
      </label>
      <label>
        {{ 'quote.fields.company' | transloco }}
        <input
          type="text"
          autocomplete="organization"
          formControlName="company"
        >
      </label>
      <label [class.has-error]="showError('market')">
        {{ 'quote.fields.market' | transloco }}
        <select formControlName="market">
          @for (market of markets; track market.value) {
            <option [value]="market.value">{{ market.labelKey | transloco }}</option>
          }
        </select>
        @if (errorMessage('market'); as error) {
          <span class="field-error">{{ error.key | transloco: error.params }}</span>
        }
      </label>
      <label [class.has-error]="showError('category')">
        {{ 'quote.fields.category' | transloco }}
        <select formControlName="category">
          @for (category of categories; track category.value) {
            <option [value]="category.value">{{ category.labelKey | transloco }}</option>
          }
        </select>
        @if (errorMessage('category'); as error) {
          <span class="field-error">{{ error.key | transloco: error.params }}</span>
        }
      </label>
      <label [class.has-error]="showError('volume')">
        {{ 'quote.fields.volume' | transloco }}
        <select formControlName="volume">
          @for (volume of volumes; track volume.value) {
            <option [value]="volume.value">{{ volume.labelKey | transloco }}</option>
          }
        </select>
        @if (errorMessage('volume'); as error) {
          <span class="field-error">{{ error.key | transloco: error.params }}</span>
        }
      </label>
      <label>
        {{ 'quote.fields.contactDetails' | transloco }}
        <input
          type="text"
          autocomplete="tel"
          [placeholder]="'quote.placeholders.contactDetails' | transloco"
          formControlName="contactDetails"
        >
      </label>
      <label class="full-field" [class.has-error]="showError('message')">
        {{ 'quote.fields.message' | transloco }}
        <textarea
          rows="4"
          [placeholder]="'quote.placeholders.message' | transloco"
          formControlName="message"
        ></textarea>
        @if (errorMessage('message'); as error) {
          <span class="field-error">{{ error.key | transloco: error.params }}</span>
        }
      </label>
      <label class="consent-field full-field" [class.has-error]="showError('privacyAccepted')">
        <input type="checkbox" formControlName="privacyAccepted">
        <span>{{ 'quote.fields.privacy' | transloco }}</span>
        @if (errorMessage('privacyAccepted'); as error) {
          <span class="field-error">{{ error.key | transloco: error.params }}</span>
        }
      </label>
      <p class="form-note full-field">
        {{ 'quote.note' | transloco }}
      </p>
      <button class="button primary full-width" type="submit" [disabled]="!canSubmit()">
        {{ 'quote.submit' | transloco }}
      </button>
    </form>

    <aside class="quote-result" aria-live="polite">
      <span class="result-label">{{ resultLabel() }}</span>
      <h3>{{ result().title }}</h3>
      <p>{{ result().description }}</p>
      <p class="result-meta">{{ draftStatus() }}</p>
    </aside>
  </div>
</section>
