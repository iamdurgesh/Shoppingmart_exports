<header class="site-header" [class.is-scrolled]="isScrolled" [class.is-open]="isMenuOpen">
  <a class="brand" routerLink="/" [attr.aria-label]="'nav.homeAria' | transloco" (click)="closeMenu()">
    <app-brand-logo [background]="isScrolled || isMenuOpen ? 'light' : 'dark'" />
  </a>

  <button
    class="menu-button"
    type="button"
    [attr.aria-expanded]="isMenuOpen"
    aria-controls="site-nav"
    (click)="toggleMenu()"
  >
    <span></span>
    <span></span>
    <span></span>
    <span class="sr-only">{{ 'nav.open' | transloco }}</span>
  </button>

  <nav class="site-nav" id="site-nav" [class.is-open]="isMenuOpen">
    @for (item of navItems; track item.labelKey) {
      <a
        [routerLink]="item.routerLink"
        [fragment]="item.fragment"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: item.routerLink === '/compliance' }"
        (click)="closeMenu()"
      >
        {{ item.labelKey | transloco }}
      </a>
    }
    <div class="language-switcher" [attr.aria-label]="'language.label' | transloco">
      @for (language of languages; track language.code) {
        <button
          type="button"
          [class.is-active]="activeLanguage() === language.code"
          [attr.aria-pressed]="activeLanguage() === language.code"
          [attr.aria-label]="(language.labelKey | transloco)"
          (click)="selectLanguage(language.code)"
        >
          {{ language.shortLabel }}
        </button>
      }
    </div>
  </nav>
</header>
