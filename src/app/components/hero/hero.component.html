<section class="hero" aria-labelledby="hero-title">
  <video
    class="hero-image"
    autoplay
    muted
    loop
    playsinline
    preload="metadata"
    poster="hero-container-ship.jpeg"
    aria-hidden="true"
    (loadedmetadata)="playHeroVideo($event)"
  >
    <source src="upscaled-bg-4k.webm" type="video/webm">
    <source src="background-dynamic.mp4" type="video/mp4">
    {{ 'hero.videoUnsupported' | transloco }}
  </video>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="eyebrow">{{ 'hero.eyebrow' | transloco }}</p>
    <h1 id="hero-title">{{ 'hero.title' | transloco }}</h1>
    <p class="hero-copy">
      {{ 'hero.copy' | transloco }}
    </p>
    <div class="hero-actions">
      <a class="button primary" href="#quote">{{ 'hero.primaryCta' | transloco }}</a>
      <a class="button secondary" href="#products">{{ 'hero.secondaryCta' | transloco }}</a>
    </div>
    <dl class="hero-metrics" [attr.aria-label]="'hero.metricsAria' | transloco">
      @for (metric of metrics; track metric.labelKey) {
        <div>
          <dt>{{ metric.labelKey | transloco }}</dt>
          <dd>{{ metric.valueKey | transloco }}</dd>
        </div>
      }
    </dl>
  </div>
</section>
