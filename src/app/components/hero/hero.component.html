<section class="hero" aria-labelledby="hero-title">
  <video
    class="hero-image"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
    poster="hero-container-ship.jpeg"
    aria-hidden="true"
    (loadedmetadata)="playHeroVideo($event)"
  >
    <source src="upscaled-bg-4k.mp4" type="video/mp4">
  </video>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="eyebrow">Global trade, simplified</p>
    <h1 id="hero-title">Global sourcing. Clearly handled.</h1>
    <p class="hero-copy">
      Products, documents, and logistics handled with clarity.
    </p>
    <div class="hero-actions">
      <a class="button primary" href="#quote">Start an enquiry</a>
      <a class="button secondary" href="#products">Explore categories</a>
    </div>
    <dl class="hero-metrics" aria-label="Export service highlights">
      @for (metric of metrics; track metric.label) {
        <div>
          <dt>{{ metric.label }}</dt>
          <dd>{{ metric.value }}</dd>
        </div>
      }
    </dl>
  </div>
</section>
