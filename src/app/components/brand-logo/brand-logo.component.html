<span class="brand-logo" [class.is-on-dark]="background() === 'dark'" [class.is-on-light]="background() === 'light'">
  <img
    class="brand-logo__image"
    [src]="background() === 'dark' ? 'shoppingmart-logo-light.png' : 'shoppingmart-logo.png'"
    alt="Shoppingmart Exports"
    decoding="async"
  >
</span>
