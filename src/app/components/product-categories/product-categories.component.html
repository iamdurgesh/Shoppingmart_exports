<section class="section products-section" id="products" aria-labelledby="products-title">
  <div class="section-heading">
    <div>
      <p class="section-kicker">{{ 'products.kicker' | transloco }}</p>
      <h2 id="products-title">{{ 'products.title' | transloco }}</h2>
    </div>
    <p>
      {{ 'products.copy' | transloco }}
    </p>
  </div>

  <div class="product-grid">
    @for (category of productCategories; track category.number) {
      <article class="product-card">
        <span class="product-icon">{{ category.number }}</span>
        <h3>{{ category.titleKey | transloco }}</h3>
        <p>{{ category.descriptionKey | transloco }}</p>
      </article>
    }
  </div>
</section>
