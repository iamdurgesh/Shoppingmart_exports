<section class="section process-section" id="process" aria-labelledby="process-title">
  <div class="section-heading">
    <div>
      <p class="section-kicker">{{ 'process.kicker' | transloco }}</p>
      <h2 id="process-title">{{ 'process.title' | transloco }}</h2>
    </div>
    <p>
      {{ 'process.copy' | transloco }}
    </p>
  </div>

  <ol class="timeline">
    @for (step of steps; track step.number) {
      <li>
        <span>{{ step.number }}</span>
        <div>
          <h3>{{ step.titleKey | transloco }}</h3>
          <p>{{ step.descriptionKey | transloco }}</p>
        </div>
      </li>
    }
  </ol>
</section>
